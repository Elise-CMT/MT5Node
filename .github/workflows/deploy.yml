name: Deploy MT5Node

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/opt/mt5node"
          rm: false

      - name: Build & restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/mt5node
            # Write the API token (never committed) for docker-compose interpolation.
            printf 'API_TOKEN=%s\n' "${{ secrets.API_TOKEN }}" > .env
            docker compose up -d --build
            sleep 5
            if curl -fsS -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" http://127.0.0.1:8080/health; then
              echo "Deploy OK"
            else
              echo "Deploy FAILED — recent logs:"
              docker compose logs --tail=80
              exit 1
            fi

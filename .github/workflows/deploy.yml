name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/positions-api
            git pull origin main
            /opt/positions-api/venv/bin/pip install -r requirements.txt --quiet
            systemctl restart positions-api
            sleep 2
            systemctl is-active positions-api && echo 'Deploy OK' || echo 'Deploy FAILED'

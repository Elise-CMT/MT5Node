name: Deploy MT5Node

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/opt/mt5node"
          rm: false

      - name: Build & restart container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/mt5node
            # Write the API token (never committed) for docker-compose interpolation.
            printf 'API_TOKEN=%s\n' "${{ secrets.API_TOKEN }}" > .env
            docker compose up -d --build
            echo "Waiting for MT5Node /health to come up..."
            ok=0
            for i in $(seq 1 30); do
              if curl -fsS -H "Authorization: Bearer ${{ secrets.API_TOKEN }}" http://127.0.0.1:8080/health > /tmp/mt5node_health 2>/dev/null; then
                echo "Healthy after ${i} attempt(s): $(cat /tmp/mt5node_health)"
                ok=1
                break
              fi
              sleep 3
            done
            if [ "$ok" != "1" ]; then
              echo "Deploy FAILED — /health not OK after retries; recent logs:"
              docker compose logs --tail=120
              exit 1
            fi
